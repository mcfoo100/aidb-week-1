<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Resolution Tracker 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d0f14;
    --bg2:       #141820;
    --bg3:       #1a2030;
    --border:    #1e2530;
    --border2:   #263144;
    --text:      #e2e8f0;
    --text2:     #94a3b8;
    --text3:     #475569;
    --text4:     #334155;
    --blue:      #3b82f6;
    --purple:    #8b5cf6;
    --amber:     #f59e0b;
    --cyan:      #06b6d4;
    --pink:      #ec4899;
    --green:     #22c55e;
    --green-bg:  #0f1a14;
    --green-bdr: #1a3325;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 20px 60px;
    max-width: 680px;
    margin: 0 auto;
  }

  /* ── AUTH OVERLAY ── */
  #auth-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .auth-card {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 400px;
  }

  .auth-logo {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--cyan);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .auth-title {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: #f1f5f9;
    margin-bottom: 28px;
    line-height: 1.3;
  }

  .auth-tabs {
    display: flex;
    gap: 4px;
    background: var(--bg);
    border-radius: 8px;
    padding: 4px;
    margin-bottom: 24px;
  }

  .auth-tab {
    flex: 1;
    padding: 8px;
    border: none;
    border-radius: 6px;
    background: transparent;
    color: var(--text3);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .auth-tab.active { background: var(--bg3); color: var(--text); }

  .auth-field { margin-bottom: 14px; }

  .auth-label {
    display: block;
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .auth-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .auth-input:focus { border-color: var(--cyan); }

  .auth-btn {
    width: 100%;
    padding: 13px;
    background: var(--cyan);
    color: #000;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 6px;
    transition: opacity 0.2s;
  }

  .auth-btn:hover { opacity: 0.9; }
  .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .auth-msg {
    margin-top: 14px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    display: none;
  }

  .auth-msg.error { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.2); display: block; }
  .auth-msg.success { background: rgba(34,197,94,0.1); color: #4ade80; border: 1px solid rgba(34,197,94,0.2); display: block; }

  /* ── HEADER ── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .title-block h1 {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    color: #f1f5f9;
    letter-spacing: -0.5px;
    line-height: 1.2;
  }

  .title-block p { font-size: 13px; color: var(--text3); margin-top: 5px; font-weight: 300; }

  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }

  .overall-pct { text-align: right; }

  .pct-num {
    font-family: 'Space Mono', monospace;
    font-size: 40px;
    font-weight: 700;
    color: #f1f5f9;
    line-height: 1;
  }

  .pct-num span { font-size: 22px; color: var(--text3); }
  .pct-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1.2px; margin-top: 4px; }

  .signout-btn {
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text3);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .signout-btn:hover { border-color: var(--text3); color: var(--text2); }

  /* ── MASTER BAR ── */
  .master-bar { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; margin-bottom: 24px; }

  .master-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--blue), var(--cyan));
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }

  /* ── STAT CARDS ── */
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 32px; }

  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 12px; text-align: center; }

  .stat-num { font-family: 'Space Mono', monospace; font-size: 24px; font-weight: 700; line-height: 1; margin-bottom: 5px; }
  .stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }

  /* ── SECTION LABEL ── */
  .section-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.8px; margin: 24px 0 10px 2px; }

  /* ── CARDS ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px 14px 20px;
    margin-bottom: 8px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
    overflow: hidden;
  }

  .card:hover { border-color: var(--border2); background: #161c26; }
  .card.done { background: var(--green-bg); border-color: var(--green-bdr); }

  .card-accent { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }

  .card-check {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 1.5px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
    transition: all 0.2s;
    background: transparent;
    font-size: 13px; color: transparent;
    user-select: none; cursor: pointer;
  }

  .card.done .card-check { background: var(--green); border-color: var(--green); color: #fff; }

  .card-body { flex: 1; min-width: 0; }

  .card-top { display: flex; align-items: baseline; gap: 8px; margin-bottom: 3px; }

  .card-num { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text3); flex-shrink: 0; }
  .card-title { font-size: 14px; font-weight: 500; color: #cbd5e1; line-height: 1.3; }
  .card.done .card-title { color: #86efac; }
  .card-deliverable { font-size: 12px; color: var(--text3); line-height: 1.5; margin-bottom: 4px; }
  .card.done .card-deliverable { color: #4ade80; opacity: 0.7; }
  .date-tag { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--green); margin-bottom: 8px; }

  /* ── STARS ── */
  .score-row { display: flex; gap: 16px; margin: 8px 0 6px; flex-wrap: wrap; }

  .score-item label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; display: block; margin-bottom: 4px; }

  .stars { display: flex; gap: 3px; }

  .star { width: 20px; height: 20px; border-radius: 4px; background: var(--bg3); border: 1px solid var(--border2); cursor: pointer; transition: background 0.1s, border-color 0.1s; }
  .star.lit { background: var(--amber); border-color: var(--amber); }

  /* ── HOURS ── */
  .hours-row { display: flex; align-items: center; gap: 10px; margin: 6px 0; }

  .hours-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; }

  .hours-input {
    width: 70px;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 5px 9px;
    color: var(--text2);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
  }

  .hours-input:focus { border-color: var(--cyan); }

  /* ── NOTES ── */
  .notes-toggle { font-size: 11px; color: var(--text4); cursor: pointer; background: none; border: none; padding: 0; font-family: 'DM Sans', sans-serif; transition: color 0.15s; display: block; margin-top: 2px; }
  .notes-toggle:hover { color: var(--text3); }
  .notes-area { display: none; margin-top: 8px; }
  .notes-area.open { display: block; }

  .notes-area textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 12px;
    padding: 9px 11px; resize: none; outline: none; height: 72px;
    transition: border-color 0.15s; line-height: 1.5;
  }

  .notes-area textarea:focus { border-color: var(--border2); }
  .notes-area textarea::placeholder { color: var(--text4); }

  /* ── TOAST ── */
  #save-toast {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: 8px; padding: 9px 14px;
    font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text3);
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }

  #save-toast.show { opacity: 1; }
  #save-toast.saved { color: var(--green); }
  #save-toast.error { color: #f87171; }

  /* ── LOADING ── */
  #app { display: none; }

  #loading-overlay {
    position: fixed; inset: 0; background: var(--bg); z-index: 998;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text3);
    letter-spacing: 2px; gap: 12px;
  }

  .spin { width: 18px; height: 18px; border: 2px solid var(--border2); border-top-color: var(--cyan); border-radius: 50%; animation: spin 0.7s linear infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .footer { margin-top: 40px; text-align: center; font-size: 12px; color: var(--text4); font-family: 'Space Mono', monospace; }

  @media (max-width: 420px) {
    .stats-row { gap: 8px; }
    .stat-num { font-size: 20px; }
    .pct-num { font-size: 32px; }
  }
</style>
</head>
<body>

<div id="loading-overlay"><div class="spin"></div> LOADING</div>

<div id="auth-overlay" style="display:none">
  <div class="auth-card">
    <div class="auth-logo">AI Resolution · 2026</div>
    <div class="auth-title">Track Your<br>AI Journey</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" onclick="switchTab('signup')">Create Account</button>
    </div>
    <div class="auth-field">
      <label class="auth-label">Email</label>
      <input id="auth-email" class="auth-input" type="email" placeholder="you@example.com" />
    </div>
    <div class="auth-field">
      <label class="auth-label">Password</label>
      <input id="auth-password" class="auth-input" type="password" placeholder="••••••••"
        onkeydown="if(event.key==='Enter') handleAuth()" />
    </div>
    <button class="auth-btn" id="auth-btn" onclick="handleAuth()">Sign In</button>
    <div id="auth-msg" class="auth-msg"></div>
  </div>
</div>

<div id="app">
  <div class="header">
    <div class="title-block">
      <h1>AI Resolution<br>Tracker</h1>
      <p>10-Weekend Path to AI Fluency · 2026</p>
    </div>
    <div class="header-right">
      <div class="overall-pct">
        <div class="pct-num" id="pct-num">0<span>%</span></div>
        <div class="pct-label">Complete</div>
      </div>
      <button class="signout-btn" onclick="signOut()">Sign Out</button>
    </div>
  </div>

  <div class="master-bar"><div class="master-bar-fill" id="master-fill" style="width:0%"></div></div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="stat-done" style="color:var(--green)">0</div><div class="stat-label">Done</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-left" style="color:var(--blue)">12</div><div class="stat-label">Remaining</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-avg" style="color:var(--amber)">—</div><div class="stat-label">Avg Quality</div></div>
  </div>

  <div id="weekend-list"></div>
  <div class="footer">built with claude · ai resolution 2026</div>
</div>

<div id="save-toast">Saving…</div>

<script>
const SUPABASE_URL = 'https://fxrlodlwnidpcycboasv.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4cmxvZGx3bmlkcGN5Y2JvYXN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MDI5MjQsImV4cCI6MjA4OTM3ODkyNH0.VJhU0YEk_l_O9I5XrDRUDn9mHF66GyC3tc2FeHyKHfA';

const WEEKENDS = [
  { id:'d0',  num:'DAY 0', title:'Day Zero Setup',            deliverable:'Folders · Accounts · Rubric saved',         section:'FOUNDATION',    color:'#3b82f6' },
  { id:'w1',  num:'WK 01', title:'Vibe Code Kickoff',         deliverable:'Resolution tracker built & live',            section:null,            color:'#3b82f6' },
  { id:'w2',  num:'WK 02', title:'Model Topography',          deliverable:'Topography Sheet + Rules of Thumb',          section:null,            color:'#3b82f6' },
  { id:'w3',  num:'WK 03', title:'Deep Research Brief',       deliverable:'2-page brief, clear recommendation',         section:'CORE PROJECTS', color:'#8b5cf6' },
  { id:'w4',  num:'WK 04', title:'Data Analysis Memo',        deliverable:'Cleaned data · 3 insights · 3 actions',      section:null,            color:'#8b5cf6' },
  { id:'w5',  num:'WK 05', title:'Visual Explainer',          deliverable:"One infographic you'd actually share",        section:null,            color:'#8b5cf6' },
  { id:'w6',  num:'WK 06', title:'Information Pipeline',      deliverable:'Summary + FAQ + Deck from one source',        section:null,            color:'#8b5cf6' },
  { id:'w7',  num:'WK 07', title:'First Automation',          deliverable:'Content workflow running end-to-end',         section:'AUTOMATION',    color:'#f59e0b' },
  { id:'w8',  num:'WK 08', title:'Second Automation',         deliverable:'Productivity workflow running',               section:null,            color:'#f59e0b' },
  { id:'w9',  num:'WK 09', title:'Personal Context OS',       deliverable:'Context Docs + Capture system live',          section:'SYSTEM & BUILD',color:'#06b6d4' },
  { id:'w10', num:'WK 10', title:'AI-Powered Build',          deliverable:'Chatbot or Agent deployed',                   section:null,            color:'#06b6d4' },
  { id:'bns', num:'BONUS', title:'Agent Evaluation Gauntlet', deliverable:'Scorecard + Best use cases identified',       section:'BONUS',         color:'#ec4899' },
];

const SECTION_COLORS = { 'FOUNDATION':'#3b82f6', 'CORE PROJECTS':'#8b5cf6', 'AUTOMATION':'#f59e0b', 'SYSTEM & BUILD':'#06b6d4', 'BONUS':'#ec4899' };
const TOTAL = WEEKENDS.length;

let db = null;
let currentUser = null;
let state = {};
let authMode = 'login';
let saveTimer = null;

window.addEventListener('load', async () => {
  db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const { data: { session } } = await db.auth.getSession();
  if (session) {
    currentUser = session.user;
    await loadProgress();
    showApp();
  } else {
    showAuth();
  }
});

function showAuth() {
  document.getElementById('loading-overlay').style.display = 'none';
  document.getElementById('auth-overlay').style.display = 'flex';
}

function showApp() {
  document.getElementById('loading-overlay').style.display = 'none';
  document.getElementById('auth-overlay').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  render();
}

function switchTab(mode) {
  authMode = mode;
  document.querySelectorAll('.auth-tab').forEach((t, i) => {
    t.classList.toggle('active', (i===0 && mode==='login') || (i===1 && mode==='signup'));
  });
  document.getElementById('auth-btn').textContent = mode === 'login' ? 'Sign In' : 'Create Account';
  document.getElementById('auth-msg').className = 'auth-msg';
}

async function handleAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const btn = document.getElementById('auth-btn');
  if (!email || !password) return showMsg('Please enter email and password.', 'error');
  btn.disabled = true; btn.textContent = '…';
  const result = authMode === 'login'
    ? await db.auth.signInWithPassword({ email, password })
    : await db.auth.signUp({ email, password });
  btn.disabled = false;
  btn.textContent = authMode === 'login' ? 'Sign In' : 'Create Account';
  if (result.error) { showMsg(result.error.message, 'error'); return; }
  if (authMode === 'signup' && !result.data.session) { showMsg('Check your email to confirm your account.', 'success'); return; }
  currentUser = result.data.user;
  await loadProgress();
  showApp();
}

function showMsg(text, type) {
  const el = document.getElementById('auth-msg');
  el.textContent = text;
  el.className = 'auth-msg ' + type;
}

async function signOut() {
  await db.auth.signOut();
  currentUser = null; state = {};
  document.getElementById('app').style.display = 'none';
  showAuth();
}

async function loadProgress() {
  const { data, error } = await db.from('weekend_progress').select('*').eq('user_id', currentUser.id);
  if (error) { console.error(error); return; }
  state = {};
  (data || []).forEach(row => {
    state[row.weekend_id] = { done: row.done, quality: row.quality||0, time_saved: row.time_saved||0, notes: row.notes||'', hours_spent: row.hours_spent||0, date: row.date_completed||'' };
  });
}

async function saveRow(id) {
  const s = getS(id);
  showToast('saving');
  const { error } = await db.from('weekend_progress').upsert({
    user_id: currentUser.id, weekend_id: id,
    done: s.done, quality: s.quality, time_saved: s.time_saved,
    notes: s.notes, hours_spent: s.hours_spent,
    date_completed: s.date, updated_at: new Date().toISOString(),
  }, { onConflict: 'user_id,weekend_id' });
  if (error) { showToast('error'); console.error(error); } else { showToast('saved'); }
}

function debounceSave(id) {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveRow(id), 600);
}

function getS(id) {
  return state[id] || { done:false, quality:0, time_saved:0, notes:'', hours_spent:0, date:'' };
}

function toggle(id) {
  let s = getS(id);
  s.done = !s.done;
  if (s.done && !s.date) s.date = new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  if (!s.done) s.date = '';
  state[id] = s;
  saveRow(id);
  renderCard(id);
  updateStats();
}

function setScore(id, field, val) {
  let s = getS(id); s[field] = val; state[id] = s;
  debounceSave(id); renderCard(id); updateStats();
}

function setNotes(id, val) {
  let s = getS(id); s.notes = val; state[id] = s; debounceSave(id);
}

function setHours(id, val) {
  let s = getS(id); s.hours_spent = parseFloat(val)||0; state[id] = s; debounceSave(id);
}

function toggleNotes(id) {
  const el = document.getElementById('notes-' + id);
  if (el) el.classList.toggle('open');
  const btn = document.getElementById('ntoggle-' + id);
  if (btn) {
    const s = getS(id);
    const open = el && el.classList.contains('open');
    btn.textContent = (s.notes ? 'notes saved · ' : '') + (open ? 'hide notes' : '+ add notes');
  }
}

function buildCardHTML(w) {
  const s = getS(w.id);
  return `
    <div class="card ${s.done?'done':''}" id="card-${w.id}">
      <div class="card-accent" style="background:${w.color}"></div>
      <div class="card-check" onclick="toggle('${w.id}')">${s.done?'✓':''}</div>
      <div class="card-body">
        <div class="card-top">
          <span class="card-num">${w.num}</span>
          <span class="card-title">${w.title}</span>
        </div>
        <div class="card-deliverable">${w.deliverable}</div>
        ${s.done ? `<div class="date-tag">${s.date}</div>` : ''}
        ${s.done ? `
        <div class="score-row">
          <div class="score-item">
            <label>Outcome quality</label>
            <div class="stars">${[1,2,3,4,5].map(n=>`<div class="star ${s.quality>=n?'lit':''}" onclick="setScore('${w.id}','quality',${n})"></div>`).join('')}</div>
          </div>
          <div class="score-item">
            <label>Time saved</label>
            <div class="stars">${[1,2,3,4,5].map(n=>`<div class="star ${s.time_saved>=n?'lit':''}" onclick="setScore('${w.id}','time_saved',${n})"></div>`).join('')}</div>
          </div>
        </div>
        <div class="hours-row">
          <span class="hours-label">Hours spent</span>
          <input type="number" class="hours-input" value="${s.hours_spent||''}" min="0" max="20" step="0.5" placeholder="0" oninput="setHours('${w.id}',this.value)" />
        </div>` : ''}
        <button class="notes-toggle" id="ntoggle-${w.id}" onclick="toggleNotes('${w.id}')">${s.notes?'notes saved · ':''}+ add notes</button>
        <div class="notes-area" id="notes-${w.id}">
          <textarea placeholder="Best prompt, what worked, what didn't, tools used…" oninput="setNotes('${w.id}',this.value)">${s.notes||''}</textarea>
        </div>
      </div>
    </div>`;
}

function renderCard(id) {
  const w = WEEKENDS.find(x => x.id===id);
  if (!w) return;
  const existing = document.getElementById('card-'+id);
  if (!existing) return;
  const wasOpen = document.getElementById('notes-'+id)?.classList.contains('open');
  const tmp = document.createElement('div');
  tmp.innerHTML = buildCardHTML(w);
  existing.replaceWith(tmp.firstElementChild);
  if (wasOpen) document.getElementById('notes-'+id)?.classList.add('open');
}

function updateStats() {
  const done = WEEKENDS.filter(w => getS(w.id).done).length;
  const pct = Math.round((done/TOTAL)*100);
  document.getElementById('pct-num').innerHTML = pct+'<span>%</span>';
  document.getElementById('master-fill').style.width = pct+'%';
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-left').textContent = TOTAL-done;
  const qs = WEEKENDS.map(w=>getS(w.id)).filter(s=>s.done&&s.quality>0).map(s=>s.quality);
  document.getElementById('stat-avg').textContent = qs.length ? (qs.reduce((a,b)=>a+b,0)/qs.length).toFixed(1) : '—';
}

function render() {
  updateStats();
  let html = '';
  WEEKENDS.forEach(w => {
    if (w.section) html += `<div class="section-label" style="color:${SECTION_COLORS[w.section]}">${w.section}</div>`;
    html += buildCardHTML(w);
  });
  document.getElementById('weekend-list').innerHTML = html;
}

function showToast(s) {
  const el = document.getElementById('save-toast');
  el.className = 'show ' + s;
  el.textContent = s==='saving' ? 'Saving…' : s==='saved' ? '✓ Saved' : '✗ Error';
  clearTimeout(el._t);
  if (s !== 'saving') el._t = setTimeout(() => el.classList.remove('show'), 2000);
}
</script>
</body>
</html>
